---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: kea-ubuntu-jammy
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    user: root
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  log: true
  config_options:
    defaults:
      remote_tmp: /dev/shm/.ansible/tmp
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - idempotence
    - verify
    - destroy
