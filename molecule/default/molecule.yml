---
dependency:
  name: galaxy
  options:
    requirements-file: collections.yml

driver:
  name: docker

platforms:
  - name: docker-ubuntu2604-ansible
    # Pinned by digest for supply-chain integrity. Refresh intentionally (pulled 2026-04-09 UTC).
    image: geerlingguy/docker-ubuntu2604-ansible@sha256:0078a36e38a6a7ec0871c80c258b86a591167f58b2f8ef2f7e13169c934ba0ea
    user: root
    pre_build_image: true
    privileged: true
    command: /lib/systemd/systemd
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  log: true
  config_options:
    defaults:
      remote_tmp: /dev/shm/.ansible/tmp
  playbooks:
    converge: converge.yml
    verify: verify.yml

scenario:
  test_sequence:
    - destroy
    - create
    - converge
    - idempotence
    - verify
    - destroy
